name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Electron2D.sln

      - name: Verify source license headers
        shell: pwsh
        run: ./tools/Verify-SourceLicenseHeaders.ps1

      - name: Verify source domain layout
        shell: pwsh
        run: ./tools/Verify-SourceDomainLayout.ps1

      - name: Run tests
        shell: pwsh
        run: ./tools/Run-Tests.ps1

      - name: Verify Box2D.NET physics candidate
        shell: pwsh
        run: ./tools/Verify-Box2DPhysicsCandidate.ps1 -NativeAot

      - name: Verify project template
        shell: pwsh
        run: ./tools/Verify-ProjectTemplate.ps1

      - name: Verify user documentation
        shell: pwsh
        run: ./tools/Verify-UserDocumentation.ps1

      - name: Verify reference game assets
        shell: pwsh
        run: ./tools/Verify-ReferenceGameAssets.ps1

      - name: Verify public API XML documentation
        shell: pwsh
        run: ./tools/Verify-PublicApiXmlDocs.ps1 -FailOnIssues

      - name: Checkout GitHub Wiki
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .github | Out-Null
          git clone --depth 1 https://github.com/edwardgushchin/Electron2D.wiki.git .github/wiki

      - name: Verify GitHub Wiki API reference
        shell: pwsh
        run: ./tools/Update-ApiWiki.ps1 -OutputPath .github/wiki -Check

      - name: Verify UI public API gate
        shell: pwsh
        run: ./tools/Verify-UiPublicApiGate.ps1 -WikiPath .github/wiki

      - name: Verify public API documentation audit
        shell: pwsh
        run: ./tools/Verify-PublicApiDocumentationAudit.ps1 -WikiPath .github/wiki

      - name: Verify Windows export
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: ./tools/Verify-WindowsExport.ps1

      - name: Verify Linux export
        if: matrix.os == 'ubuntu-latest'
        shell: pwsh
        run: ./tools/Verify-LinuxExport.ps1

      - name: Verify macOS export
        if: matrix.os == 'macos-latest'
        shell: pwsh
        run: ./tools/Verify-MacOSExport.ps1

      - name: Verify performance budgets
        shell: pwsh
        run: ./tools/Verify-PerformanceBudgets.ps1

  mobile-export-status:
    name: Mobile/export status gap
    runs-on: ubuntu-latest

    steps:
      - name: Report Android/iOS/export gate status
        run: |
          echo "Android/iOS/mobile export smoke checks are not active in the clean runtime baseline yet."
          echo "They remain explicit release gaps until the mobile export pipeline tasks implement them."

name: CI

on:
  push:
    branches:
      - main
  pull_request:

defaults:
  run:
    shell: bash

jobs:
  tests:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore src/Electron2D.sln

      - name: Verify C# workflow routes
        run: dotnet run --project eng/Electron2D.Build -- verify no-powershell-workflows

      - name: Verify CI matrix
        run: dotnet run --project eng/Electron2D.Build -- verify ci-matrix

      - name: Verify source license headers
        run: dotnet run --project eng/Electron2D.Build -- verify licenses

      - name: Verify source domain layout
        run: dotnet run --project eng/Electron2D.Build -- verify source-domain-layout

      - name: Run tests
        run: dotnet run --project eng/Electron2D.Build -- test --timeout-seconds 3600

      - name: Verify Box2D.NET physics candidate
        run: dotnet run --project eng/Electron2D.Build -- verify box2d-physics-candidate --native-aot

      - name: Verify project template
        run: dotnet run --project eng/Electron2D.Build -- verify project-template

      - name: Verify user documentation
        run: dotnet run --project eng/Electron2D.Build -- verify user-documentation

      - name: Verify local documentation
        run: dotnet run --project eng/Electron2D.Build -- verify docs

      - name: Verify canonical goal alignment
        run: dotnet run --project eng/Electron2D.Build -- verify canonical-goal-alignment

      - name: Verify export documentation
        run: dotnet run --project eng/Electron2D.Build -- verify export-documentation

      - name: Verify reference game assets
        run: dotnet run --project eng/Electron2D.Build -- verify reference-game-assets

      - name: Verify public API XML documentation
        run: dotnet run --project eng/Electron2D.Build -- verify public-api-xml-docs --fail-on-issues

      - name: Checkout GitHub Wiki
        run: |
          mkdir -p .github
          git clone --depth 1 https://github.com/edwardgushchin/Electron2D.wiki.git .github/wiki

      - name: Verify API manifest
        run: dotnet run --project eng/Electron2D.Build -- update api-manifest --wiki-path .github/wiki --check

      - name: Verify GitHub Wiki API reference
        run: dotnet run --project eng/Electron2D.Build -- update wiki --output .github/wiki --check

      - name: Verify API compatibility table
        run: dotnet run --project eng/Electron2D.Build -- verify api-compatibility --wiki-path .github/wiki

      - name: Verify UI public API gate
        run: dotnet run --project eng/Electron2D.Build -- verify ui-public-api-gate --wiki-path .github/wiki

      - name: Verify public API documentation audit
        run: dotnet run --project eng/Electron2D.Build -- verify public-api-documentation --wiki-path .github/wiki

      - name: Verify Windows export
        if: matrix.os == 'windows-latest'
        run: dotnet run --project eng/Electron2D.Build -- package --rid win-x64

      - name: Verify Linux export
        if: matrix.os == 'ubuntu-latest'
        run: dotnet run --project eng/Electron2D.Build -- package --rid linux-x64

      - name: Verify macOS export
        if: matrix.os == 'macos-latest'
        run: dotnet run --project eng/Electron2D.Build -- package --rid osx-arm64

      - name: Verify performance budgets
        run: dotnet run --project eng/Electron2D.Build -- verify performance-budgets

      - name: Verify reference performance metrics
        run: dotnet run --project eng/Electron2D.Build -- verify performance

  mobile-export-status:
    name: Mobile/export status gap
    runs-on: ubuntu-latest

    steps:
      - name: Report Android/iOS/export gate status
        run: |
          echo "Android/iOS/mobile export smoke checks are not active in the clean runtime baseline yet."
          echo "They remain explicit release gaps until the mobile export pipeline tasks implement them."

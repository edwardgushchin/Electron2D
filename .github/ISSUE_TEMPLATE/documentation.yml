name: Documentation issue
description: Report missing, incorrect or confusing documentation.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link to the page or file, if known.
      placeholder: https://github.com/edwardgushchin/Electron2D/wiki/...
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is wrong or missing?
    validations:
      required: true
  - type: textarea
    id: improvement
    attributes:
      label: Suggested improvement
      description: Optional. Describe the wording, guide or example that would help.
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed secrets, private keys, tokens, private data and credentials.
          required: true
